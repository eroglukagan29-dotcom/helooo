<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nisa'ya Özel ✨</title>
    <style>
        * {
            box-sizing: border-box;
            transition: background 0.5s ease, transform 0.3s ease;
        }

        body {
            font-family: 'PingFang SC', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #fff0f3, #ffccd5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(255, 179, 198, 0.4);
            max-width: 380px;
            width: 90%;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        h1, h2 {
            color: #ff5c8a;
            font-size: 1.6rem;
            line-height: 1.4;
            margin-bottom: 25px;
            font-weight: 600;
        }

        p {
            color: #774955;
            font-size: 1.1rem;
        }

        .gif-container img {
            width: 100%;
            max-width: 180px;
            border-radius: 20px;
            margin-bottom: 20px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.05));
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
            position: relative;
            height: 60px; /* Butonların hareket alanı burası olacak */
        }

        button {
            padding: 12px 28px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
        }

        #yesBtn {
            background-color: #ff758f;
            color: white;
            box-shadow: 0 6px 20px rgba(255, 117, 143, 0.4);
            z-index: 2;
        }

        #yesBtn:hover {
            transform: scale(1.1);
            background-color: #ff4d6d;
        }

        #noBtn {
            background-color: #ffe5ec;
            color: #ff758f;
            position: absolute;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: 1px solid #ffccd5;
        }

        .success-message {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <div id="proposalStage">
            <div class="gif-container">
                <img src="https://media.tenor.com/w9Gf0zI4V2AAAAAi/tkthao219-bubududu.gif" alt="Cute GIF">
            </div>
            <h1>Nisa, benimle çıkıp büyük bir aşk yaşamaya var mısın? 🌹✨</h1>
            
            <div class="buttons" id="btnWrapper">
                <button id="yesBtn" onclick="celebrate()">Evet! 😍</button>
                <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">Hayır 😢</button>
            </div>
        </div>

        <div id="successStage" class="success-message">
            <div class="gif-container">
                <img src="https://media.tenor.com/9v1M6_Wp3-AAAAAi/bubu-dudu-bubu.gif" alt="Happy GIF">
            </div>
            <h2>Ooo süper! En doğru kararı verdin 🥳❤️</h2>
            <p>O zaman bu anı kutluyoruz! 😉</p>
        </div>
    </div>

    <script>
        // Hayır butonunun sadece buton alanında (buttons) kaçmasını sağlayan akıllı fonksiyon
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            const wrapper = document.getElementById('btnWrapper');
            
            // Kutu içi sınırları hesapla
            const maxX = wrapper.clientWidth - noBtn.offsetWidth;
            const maxY = wrapper.clientHeight - noBtn.offsetHeight;
            
            // Rastgele ama mantıklı sınırlar içinde yeni koordinat üret
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY) - 10; // Biraz yukarı aşağı oynama payı
            
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // İlk başta butonun yerini düzgün sabitlemek için sıfırlayalım
        window.onload = function() {
            const noBtn = document.getElementById('noBtn');
            noBtn.style.right = '20px';
            noBtn.style.top = '10px';
        }

        function celebrate() {
            document.getElementById('proposalStage').style.display = 'none';
            document.getElementById('successStage').style.display = 'block';
            
            // Arka planı daha da tatlı, sıcak bir pembeye geçiriyoruz
            document.body.style.background = "linear-gradient(135deg, #ffe5ec, #ffb3c6)";
        }
    </script>
</body>
</html>
