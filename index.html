<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nisa'ya Özel ✨</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe5ec, #ffb3c6);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 90%;
            transition: all 0.3s ease;
        }

        h1 {
            color: #ff477e;
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        .gif-container img {
            width: 80%;
            max-width: 200px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            position: relative;
            height: 50px;
        }

        button {
            padding: 12px 25px;
            font-size: 1.1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        #yesBtn {
            background-color: #ff477e;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 71, 126, 0.4);
        }

        #yesBtn:hover {
            transform: scale(1.1);
        }

        #noBtn {
            background-color: #ccc;
            color: #333;
            position: absolute;
            right: 50px;
        }

        .success-message {
            display: none;
        }

        .success-message h2 {
            color: #ff477e;
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <div id="proposalStage">
            <!-- Tenor'dan tatlı bir stitch/mochi kedisi gifi -->
            <div class="gif-container">
                <img src="https://media.tenor.com/w9Gf0zI4V2AAAAAi/tkthao219-bubududu.gif" alt="Cute GIF">
            </div>
            <h1>Nisa, benimle çıkıp hayatıma renk katmaya var mısın? 🌹✨</h1>
            
            <div class="buttons">
                <button id="yesBtn" onclick="celebrate()">Evet! 😍</button>
                <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">Hayır 😢</button>
            </div>
        </div>

        <div id="successStage" class="success-message">
            <div class="gif-container">
                <img src="https://media.tenor.com/9v1M6_Wp3-AAAAAi/bubu-dudu-bubu.gif" alt="Happy GIF">
            </div>
            <h2>Ooo süper! En doğru kararı verdin 🥳❤️</h2>
            <p>O zaman bu anı kutluyoruz! 😉</p>
        </div>
    </div>

    <script>
        // Hayır butonunu kaçırma fonksiyonu
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            // Ekran sınırları içinde rastgele bir yere fırlatıyoruz
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 50);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 50);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        // Evet'e basınca olacaklar
        function celebrate() {
            document.getElementById('proposalStage').style.display = 'none';
            document.getElementById('successStage').style.display = 'block';
            
            // Arka planı konfeti havasına sokalım
            document.body.style.background = "linear-gradient(135deg, #ffe5ec, #ff758f)";
        }
    </script>
</body>
</html>
