<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nisa'ya Özel ✨</title>
    <style>
        * {
            box-sizing: border-box;
            transition: background 0.5s ease, transform 0.3s ease;
        }

        body {
            font-family: 'PingFang SC', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #fff0f3, #ffccd5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(255, 179, 198, 0.4);
            max-width: 380px;
            width: 90%;
            height: 480px; /* Butonun rahat kaçabilmesi için sabit yükseklik verdik */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        h1, h2 {
            color: #ff5c8a;
            font-size: 1.5rem;
            line-height: 1.4;
            margin-top: 0;
            margin-bottom: 15px;
            font-weight: 600;
        }

        p {
            color: #774955;
            font-size: 1.1rem;
        }

        .gif-container img {
            width: 100%;
            max-width: 160px;
            border-radius: 20px;
            margin-bottom: 10px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.05));
        }

        /* Butonların ilk duracağı alan */
        .buttons-wrapper {
            margin-top: auto;
            margin-bottom: 10px;
            height: 50px;
            position: relative;
        }

        button {
            padding: 12px 28px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
        }

        #yesBtn {
            background-color: #ff758f;
            color: white;
            box-shadow: 0 6px 20px rgba(255, 117, 143, 0.4);
            position: absolute;
            left: 20px;
            bottom: 0;
        }

        #yesBtn:hover {
            transform: scale(1.1);
            background-color: #ff4d6d;
        }

        #noBtn {
            background-color: #ffe5ec;
            color: #ff758f;
            position: absolute;
            right: 20px;
            bottom: 0;
            transition: all 0.15s ease-out;
            border: 1px solid #ffccd5;
            z-index: 10;
        }

        .success-message {
            display: none;
            margin: auto 0;
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <div id="proposalStage" style="height: 100%; display: flex; flex-direction: column; justify-content: space-between;">
            <div class="gif-container">
                <img src="https://media.tenor.com/w9Gf0zI4V2AAAAAi/tkthao219-bubududu.gif" alt="Cute GIF">
            </div>
            <h1>Nisa, benimle çıkıp hayatıma renk katmaya var mısın? 🌹✨</h1>
            
            <div class="buttons-wrapper">
                <button id="yesBtn" onclick="celebrate()">Evet! 😍</button>
                <button id="noBtn" onmouseenter="moveButton()" onclick="moveButton()">Hayır 😢</button>
            </div>
        </div>

        <div id="successStage" class="success-message">
            <div class="gif-container">
                <img src="https://media.tenor.com/9v1M6_Wp3-AAAAAi/bubu-dudu-bubu.gif" alt="Happy GIF">
            </div>
            <h2>Ooo süper! En doğru kararı verdin 🥳❤️</h2>
            <p>O zaman bu anı kutluyoruz! 😉</p>
        </div>
    </div>

    <script>
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            const container = document.getElementById('mainContainer');
            
            // Buton artık ana beyaz kartın (container) içinde her yere kaçabilir
            // Kartın iç padding değerlerini hesaba katarak taşmayı önlüyoruz
            const padding = 30;
            const maxX = container.clientWidth - noBtn.offsetWidth - padding;
            const maxY = container.clientHeight - noBtn.offsetHeight - padding;
            
            // Rastgele yeni konum (en az padding kadar içeride kalacak şekilde)
            let randomX = Math.floor(Math.random() * (maxX - padding)) + padding;
            let randomY = Math.floor(Math.random() * (maxY - padding)) + padding;
            
            // Butonu ana container'a göre konumlandırabilmek için absolute moduna tam geçiriyoruz
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
            noBtn.style.right = 'auto';
            noBtn.style.bottom = 'auto';
        }

        function celebrate() {
            document.getElementById('proposalStage').style.setProperty('display', 'none', 'important');
            document.getElementById('successStage').style.display = 'block';
            document.body.style.background = "linear-gradient(135deg, #ffe5ec, #ffb3c6)";
        }
    </script>
</body>
</html>
